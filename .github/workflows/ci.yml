name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run ansible-lint
        run: |
          ansible-lint . || true
      - name: Run pytest
        run: |
          pytest -q
      - name: Check requirements import
        run: |
          python -c "import requests, yaml, jsonschema" || true
