apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "k8s-insight-analyzer.fullname" . }}-config
  labels:
    {{- include "k8s-insight-analyzer.labels" . | nindent 4 }}
data:
  # Optional runtime configuration. Users can mount their prompt templates here.
  values.yaml: |
    # This ConfigMap is a placeholder for run-time templates / prompts / small configs.
    # For larger code or Python scripts, build an image with the repo contents and set image.repository.
    example: "change-me"
