{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "k8s-insight-analyzer.fullname" . }}-reader-binding
  labels:
    {{- include "k8s-insight-analyzer.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "k8s-insight-analyzer.fullname" . }}-reader
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name | default (include "k8s-insight-analyzer.fullname" .) }}
    namespace: {{ .Release.Namespace }}
{{- end -}}
