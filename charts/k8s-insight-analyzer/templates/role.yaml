{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "k8s-insight-analyzer.fullname" . }}-reader
  labels:
    {{- include "k8s-insight-analyzer.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "namespaces", "configmaps"]
    verbs: ["get", "list", "watch"]
{{- end -}}
