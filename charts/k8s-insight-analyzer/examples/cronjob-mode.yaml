# Example values: run analyzer as CronJob
# NOTE: image.repository below is a placeholder. Replace with your published image
replicaCount: 1
image:
  repository: "ghcr.io/erdembestas/k8s-insight-analyzer" # Set to your published image (e.g. ghcr.io/erdembestas/k8s-insight-analyzer)
  tag: "0.1.0"
mode:
  type: cronjob
  schedule: "0 3 * * *"
llm:
  mode: single
  apiUrl: https://api.example-llm.com/v1
  apiTokenSecretName: ops-llm-token
rag:
  enabled: false
